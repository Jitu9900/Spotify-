<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#121212">
<title>Spotify® Music</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<!-- Capacitor Core (loaded at runtime in APK) -->
<script>
// Safe wrapper — runs in both browser and Capacitor app
window.isCapacitor = false;
window.CapStorage = {
  async get(key){ try{ const v=localStorage.getItem(key); return v?JSON.parse(v):null; }catch(e){return null;} },
  async set(key,val){ try{ localStorage.setItem(key,JSON.stringify(val)); }catch(e){} },
  async remove(key){ try{ localStorage.removeItem(key); }catch(e){} }
};
document.addEventListener('deviceready', async ()=>{
  window.isCapacitor = true;
  if(window.Capacitor?.Plugins?.Preferences){
    const Pref = Capacitor.Plugins.Preferences;
    window.CapStorage = {
      async get(key){ const r=await Pref.get({key}); return r.value?JSON.parse(r.value):null; },
      async set(key,val){ await Pref.set({key, value:JSON.stringify(val)}); },
      async remove(key){ await Pref.remove({key}); }
    };
    // Reload data from device storage
    const favs = await window.CapStorage.get('mfavs');
    const pls  = await window.CapStorage.get('mplaylists');
    if(favs) window._loadedFavs = favs;
    if(pls)  window._loadedPlaylists = pls;
  }
  // Android back button
  document.addEventListener('backbutton', ()=>{
    if(document.getElementById('nowPlaying')?.classList.contains('open')){
      closeNowPlaying(); return;
    }
    if(document.getElementById('modalOverlay') && !document.getElementById('modalOverlay').classList.contains('hidden')){
      closeModal(); return;
    }
    if(document.getElementById('searchResults')?.innerHTML){
      clearSearch(); return;
    }
    if(window.Capacitor?.Plugins?.App){
      Capacitor.Plugins.App.exitApp();
    }
  }, false);
}, false);
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#121212;--surface:#181818;--s2:#282828;--s3:#333;
  --accent:#1DB954;--accent2:#1ed760;--text:#fff;--sub:#b3b3b3;--muted:#6a6a6a;
  --danger:#e91429;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;display:flex;flex-direction:column}

/* ════ ONBOARDING ════ */
#onboarding{
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(160deg,#0a0a0a 0%,#0d1f14 100%);
  display:flex;flex-direction:column;overflow:hidden;
  animation:fadeIn .5s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.ob-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;align-items:center;padding:28px 20px 16px}
.ob-logo{width:60px;height:60px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.7rem;margin-bottom:16px;flex-shrink:0;animation:pulse 2s ease-in-out infinite;box-shadow:0 0 32px rgba(29,185,84,.45)}
@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 32px rgba(29,185,84,.4)}50%{transform:scale(1.07);box-shadow:0 0 56px rgba(29,185,84,.65)}}
.ob-title{font-size:clamp(1.4rem,6vw,2rem);font-weight:800;text-align:center;margin-bottom:6px;flex-shrink:0}
.ob-sub{color:var(--sub);font-size:.82rem;text-align:center;margin-bottom:20px;max-width:340px;line-height:1.55;flex-shrink:0}
.ob-label{font-size:.65rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--sub);margin-bottom:14px;text-align:center;flex-shrink:0}
.singers-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:520px;margin-bottom:20px;flex-shrink:0}
@media(min-width:420px){.singers-grid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:600px){.singers-grid{grid-template-columns:repeat(5,1fr)}}
.singer-card{background:var(--s2);border-radius:10px;padding:12px 8px;text-align:center;cursor:pointer;border:2px solid transparent;transition:all .22s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden}
.singer-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(29,185,84,.15),transparent);opacity:0;transition:opacity .2s}
.singer-card:hover{transform:translateY(-3px) scale(1.04);border-color:rgba(29,185,84,.4)}
.singer-card:hover::before{opacity:1}
.singer-card.selected{border-color:var(--accent);background:rgba(29,185,84,.1);transform:scale(1.04)}
.singer-card.selected::before{opacity:1}
.singer-avatar{width:44px;height:44px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:1.35rem;background:linear-gradient(135deg,var(--s3),var(--s2));position:relative;transition:transform .2s}
.singer-card.selected .singer-avatar{background:linear-gradient(135deg,rgba(29,185,84,.35),rgba(29,185,84,.15))}
.singer-card.selected .singer-avatar::after{content:'✓';position:absolute;bottom:-2px;right:-2px;width:16px;height:16px;background:var(--accent);border-radius:50%;font-size:.58rem;display:flex;align-items:center;justify-content:center;color:#000;font-weight:900}
.singer-name{font-size:.68rem;font-weight:700;line-height:1.3;color:var(--text)}
.singer-genre{font-size:.58rem;color:var(--sub);margin-top:1px}
.ob-hint{font-size:.7rem;color:var(--muted);text-align:center;margin-bottom:12px;flex-shrink:0}
.ob-footer{flex-shrink:0;padding:14px 20px max(env(safe-area-inset-bottom),16px);background:linear-gradient(to top,#0a0a0a 70%,transparent);display:flex;flex-direction:column;align-items:center;gap:8px}
.ob-btn {
  background: var(--accent);
  border: none;
  border-radius: 500px;
  padding: 15px 52px;
  color: #000;
  font-family: inherit;
  font-weight: 800; /* Ye bold rakhega */
  font-size: .95rem;
  cursor: pointer;
  transition: all .2s cubic-bezier(.34,1.56,.64,1);
  opacity: 1; /* Ab button hamesha saaf dikhega */
  pointer-events: auto; /* Ab click hamesha kaam karega */
  width: 100%;
  max-width: 320px;
  box-shadow: 0 4px 20px rgba(29,185,84,0.4);
}


/* ════ APP SHELL ════ */
#appShell{display:none;flex-direction:column;height:100%;overflow:hidden}
#appShell.visible{display:flex}

/* ════ TOP BAR (Search YouTube style) ════ */
.top-bar{
  background:var(--bg);
  padding:10px 12px 0;flex-shrink:0;
  position:relative;z-index:100;
  border-bottom:1px solid rgba(255,255,255,.06);
  overflow:visible;
}
.top-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-right:4px}
.brand-icon{width:30px;height:30px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.brand-name{font-size:.95rem;font-weight:800;letter-spacing:-.01em;color:var(--text);flex-shrink:0}

/* Search bar top row */
.top-search-wrap{flex:1;min-width:0;position:relative}
.top-search-box{display:flex;align-items:center;background:#fff;border-radius:500px;padding:0 4px 0 12px;gap:4px;height:38px;transition:box-shadow .2s;overflow:hidden}
.top-search-box:focus-within{box-shadow:0 0 0 2.5px rgba(29,185,84,.5)}
.top-search-box svg{color:#121212;flex-shrink:0;width:15px;height:15px}
#searchInput{flex:1;border:none;background:none;font-family:inherit;font-size:.82rem;font-weight:500;color:#121212;outline:none;min-width:0}
#searchInput::placeholder{color:#6a6a6a}
#searchBtn{background:var(--accent);border:none;border-radius:500px;padding:7px 14px;color:#000;font-family:inherit;font-weight:700;font-size:.72rem;cursor:pointer;transition:background .15s,transform .1s;white-space:nowrap;flex-shrink:0;margin:3px}
#searchBtn:hover{background:var(--accent2);transform:scale(1.03)}
#searchBtn:disabled{opacity:.5;cursor:not-allowed;transform:none}

#suggestionsBox{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--s2);border-radius:8px;border:1px solid rgba(255,255,255,.09);box-shadow:0 14px 40px rgba(0,0,0,.8);z-index:200;overflow:hidden;display:none;max-height:380px;overflow-y:auto}
#suggestionsBox.open{display:block;animation:dropIn .16s ease}
@keyframes dropIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.suggest-header{padding:10px 14px 5px;font-size:.64rem;font-weight:700;color:var(--sub);letter-spacing:.12em;text-transform:uppercase}
.suggest-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;transition:background .12s}
.suggest-item:hover{background:var(--s3)}
.suggest-thumb{width:36px;height:36px;border-radius:4px;background:linear-gradient(135deg,#1DB954,#158a3e);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.9rem;overflow:hidden}
.suggest-thumb img{width:100%;height:100%;object-fit:cover}
.suggest-info{flex:1;min-width:0}
.suggest-title{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.suggest-artist{font-size:.68rem;color:var(--sub);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.nav-tabs{display:flex;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{padding:10px 14px;border:none;background:none;color:var(--sub);font-family:inherit;font-weight:600;font-size:.78rem;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .2s,border-color .2s;letter-spacing:.02em;white-space:nowrap;flex-shrink:0}
.nav-tab.active{color:var(--text);border-bottom-color:var(--accent)}
.nav-tab:hover:not(.active){color:var(--text)}

/* ════ MAIN SCROLL ════ */
.main-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative}
.main-content{max-width:960px;margin:0 auto;padding:16px 12px 120px}
.page{display:none;animation:pageIn .3s ease}
.page.active{display:block}
@keyframes pageIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ════ HOME PAGE ════ */
.home-hero{padding:14px 14px 12px;background:linear-gradient(135deg,rgba(29,185,84,.08),rgba(29,185,84,.03));border-radius:14px;margin-bottom:16px}
.home-greeting{font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:3px}
.home-title{font-size:clamp(1rem,4vw,1.5rem);font-weight:800;margin-bottom:2px}
.home-sub{color:var(--sub);font-size:.76rem}

.section-title{font-size:.95rem;font-weight:800;margin:0 0 10px;display:flex;align-items:center;justify-content:space-between}
.section-title em{font-size:.7rem;color:var(--accent);font-style:normal;font-weight:700;cursor:pointer;white-space:nowrap}
.section-title em:hover{text-decoration:underline}

/* Horizontal scroll rows */
.songs-row{display:flex;gap:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px;margin-bottom:20px;scrollbar-width:none}
.songs-row::-webkit-scrollbar{display:none}

.song-card{flex-shrink:0;width:128px;background:var(--surface);border-radius:10px;padding:10px;cursor:pointer;transition:background .2s,transform .18s;position:relative}
@media(min-width:420px){.song-card{width:140px}}
.song-card:hover{background:#242424;transform:translateY(-2px)}
.song-card.playing{background:rgba(29,185,84,.1)}
.song-card:active{transform:scale(.97)}

.song-thumb{width:100%;aspect-ratio:1;border-radius:7px;margin-bottom:8px;background:linear-gradient(135deg,var(--s3),#1a1a1a);display:flex;align-items:center;justify-content:center;font-size:1.8rem;position:relative;overflow:hidden;transition:box-shadow .2s}
.song-thumb img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:7px}
.song-card:hover .song-thumb,.song-card.playing .song-thumb{box-shadow:0 6px 20px rgba(0,0,0,.6)}

.song-play-overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .18s;border-radius:7px}
.song-card:hover .song-play-overlay,.song-card.playing .song-play-overlay{opacity:1}
.song-play-btn{width:36px;height:36px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;color:#000;box-shadow:0 4px 14px rgba(0,0,0,.4);transform:translateY(6px);transition:transform .18s}
.song-card:hover .song-play-btn,.song-card.playing .song-play-btn{transform:translateY(0)}

.thumb-eq{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);display:none;gap:2px;align-items:flex-end;height:12px}
.song-card.playing .thumb-eq{display:flex}
.thumb-eq span{display:block;width:3px;background:rgba(255,255,255,.85);border-radius:2px;animation:eq .8s ease-in-out infinite alternate}
.thumb-eq span:nth-child(2){animation-delay:.15s}
.thumb-eq span:nth-child(3){animation-delay:.3s}
.thumb-eq span:nth-child(4){animation-delay:.45s}
@keyframes eq{from{height:2px}to{height:10px}}

.song-name{font-size:.72rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.song-artist{font-size:.62rem;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.song-singer-tag{font-size:.56rem;color:var(--accent);font-weight:700;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.song-card.playing .song-name{color:var(--accent)}

/* ════ SEARCH PAGE STATUS ════ */
#status{margin-top:8px;font-size:.75rem;color:var(--sub);min-height:16px;padding:0 2px}
.spinner{display:inline-block;width:9px;height:9px;border:2px solid rgba(29,185,84,.3);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-right:5px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* ════ TRACK LIST ════ */
.track-list{display:flex;flex-direction:column;gap:2px}
.result-card{display:flex;align-items:center;gap:9px;padding:8px 8px;border-radius:7px;cursor:pointer;transition:background .12s,transform .1s;position:relative}
.result-card:hover{background:var(--s2)}
.result-card.playing{background:rgba(29,185,84,.1)}
.result-card:active{transform:scale(.99)}

.rc-num{font-size:.72rem;color:var(--sub);width:16px;text-align:center;flex-shrink:0}
.result-card.playing .rc-num{display:none}
.rc-eq{display:none;flex-shrink:0}
.result-card.playing .rc-eq{display:flex;gap:2px;align-items:flex-end;height:13px;width:16px;justify-content:center}
.rc-eq span{display:block;width:3px;background:var(--accent);border-radius:2px;animation:eq .9s ease-in-out infinite alternate}
.rc-eq span:nth-child(2){animation-delay:.2s}
.rc-eq span:nth-child(3){animation-delay:.4s}

.rc-thumb{width:40px;height:40px;border-radius:5px;background:linear-gradient(135deg,var(--s3),var(--s2));flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.95rem;overflow:hidden;transition:box-shadow .2s}
.rc-thumb img{width:100%;height:100%;object-fit:cover}
.result-card.playing .rc-thumb{box-shadow:0 0 10px rgba(29,185,84,.4)}

.rc-info{flex:1;min-width:0}
.rc-title{font-size:.8rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.result-card.playing .rc-title{color:var(--accent)}
.rc-artist{font-size:.66rem;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.rc-actions{display:flex;align-items:center;gap:4px;flex-shrink:0}
.btn-fav{background:none;border:none;cursor:pointer;font-size:.9rem;line-height:1;padding:5px;color:var(--sub);transition:color .2s,transform .2s}
.btn-fav:hover{transform:scale(1.25);color:var(--accent)}
.btn-fav.active{color:var(--accent)}
.btn-addpl{background:rgba(29,185,84,.12);border:1.5px solid rgba(29,185,84,.3);color:var(--accent);border-radius:6px;padding:4px 8px;font-size:.6rem;font-family:inherit;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .2s,border-color .2s,transform .15s;flex-shrink:0}
.btn-addpl:hover{background:rgba(29,185,84,.22);border-color:var(--accent);transform:scale(1.04)}
.btn-remove{background:none;border:1px solid rgba(233,20,41,.3);color:#e91429;border-radius:5px;padding:3px 6px;font-size:.58rem;font-family:inherit;cursor:pointer;transition:background .2s;white-space:nowrap}
.btn-remove:hover{background:rgba(233,20,41,.15)}
.rc-dur{font-size:.68rem;color:var(--sub);flex-shrink:0;min-width:28px;text-align:right}

/* ════ LYRICS ════ */
#lyricsPanel{display:none;background:var(--surface);border-radius:12px;padding:16px;margin-top:20px;border:1px solid rgba(255,255,255,.07);position:relative;overflow:hidden}
#lyricsPanel::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),#0d72ea)}
#lyricsPanel.open{display:block;animation:pageIn .3s ease}
.lyrics-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.lyrics-heading{font-size:.88rem;font-weight:800}
.lyrics-song-name{font-size:.72rem;color:var(--accent);font-weight:600;margin-top:2px}
#closeLyricsBtn{background:var(--s2);border:none;color:var(--sub);border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:.68rem;display:flex;align-items:center;justify-content:center;transition:background .2s}
#closeLyricsBtn:hover{background:var(--s3);color:var(--text)}
#lyricsContent{font-size:.8rem;line-height:1.9;color:var(--sub);white-space:pre-wrap;font-weight:500;max-height:260px;overflow-y:auto}
#recSection{margin-top:24px;display:none}

/* ════ MINI PLAYER ════ */
#miniPlayer{
  position:fixed;bottom:0;left:0;right:0;z-index:800;
  background:linear-gradient(to top,#000,#1a1a1a);
  border-top:1px solid rgba(255,255,255,.1);
  padding:8px 12px max(env(safe-area-inset-bottom),8px);
  display:none;flex-direction:column;gap:0;
  box-shadow:0 -8px 32px rgba(0,0,0,.7);
}
#miniPlayer.visible{display:flex}

/* Seek bar AT TOP of mini player */
.mini-seek-wrap{width:100%;height:16px;display:flex;align-items:center;cursor:pointer;margin-bottom:6px;position:relative;touch-action:none}
.mini-seek-track{width:100%;height:3px;background:rgba(255,255,255,.15);border-radius:3px;position:relative;overflow:visible}
.mini-seek-fill{height:100%;background:var(--accent);border-radius:3px;width:0%;transition:width .5s linear;pointer-events:none}
.mini-seek-thumb{
  position:absolute;top:50%;right:-5px;transform:translateY(-50%);
  width:12px;height:12px;background:#fff;border-radius:50%;
  opacity:0;transition:opacity .15s;pointer-events:none;
  box-shadow:0 0 6px rgba(0,0,0,.5);
}
.mini-seek-wrap:hover .mini-seek-thumb,
.mini-seek-wrap.dragging .mini-seek-thumb{opacity:1}

/* Main row: thumb + info + controls */
.mini-main-row{display:flex;align-items:center;gap:10px}

.mini-thumb{width:42px;height:42px;border-radius:6px;background:linear-gradient(135deg,var(--s3),var(--s2));flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.1rem;overflow:hidden;cursor:pointer}
.mini-thumb img{width:100%;height:100%;object-fit:cover}

.mini-info{flex:1;min-width:0;cursor:pointer}
.mini-title{font-size:.8rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.mini-artist{font-size:.65rem;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Controls — bigger, closer together */
.mini-controls{display:flex;align-items:center;gap:6px;flex-shrink:0}

.mini-btn{
  background:none;border:none;color:var(--sub);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  width:36px;height:36px;border-radius:50%;
  transition:color .15s,background .15s,transform .15s;
  font-size:1rem;flex-shrink:0;
}
.mini-btn:hover{color:var(--text);background:rgba(255,255,255,.08);transform:scale(1.1)}
.mini-btn:active{transform:scale(.93)}

/* Pause/Play bigger */
.mini-btn-play{
  background:var(--accent);color:#000;
  width:40px;height:40px;font-size:1.1rem;
  box-shadow:0 2px 12px rgba(29,185,84,.4);
}
.mini-btn-play:hover{background:var(--accent2);color:#000;transform:scale(1.1)}

/* Fav button in mini player */
.mini-btn-fav{font-size:.95rem}
.mini-btn-fav.active{color:var(--accent)}

/* ════ NOW PLAYING FULLSCREEN ════ */
#nowPlaying{
  position:fixed;inset:0;z-index:900;
  display:flex;flex-direction:column;
  transform:translateY(100%);
  transition:transform .48s cubic-bezier(.16,1,.3,1);
  overflow:hidden;
}
#nowPlaying.open{transform:translateY(0)}

.np-bg{position:absolute;inset:0;background:linear-gradient(180deg,#1a2e1a 0%,#121212 60%);z-index:0}
.np-bg-blur{position:absolute;inset:0;z-index:0;filter:blur(55px);opacity:.35;background:radial-gradient(ellipse 80% 60% at 50% 20%,rgba(29,185,84,.5),transparent);animation:bgPulse 4s ease-in-out infinite alternate}
@keyframes bgPulse{0%{opacity:.28}100%{opacity:.48}}

<!-- FIREBASE SDKs -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  // ══════════════════════════════════════
  // 🔥 APNA FIREBASE CONFIG YAHAN DAALO
  // ══════════════════════════════════════
  const firebaseConfig = {
    apiKey: "AIzaSyAE0DhbGKicH60eaD2QKJyq-R0ETzlG4oI",
    authDomain: "music-88692.firebaseapp.com",
    projectId: "music-88692",
    storageBucket: "music-88692.firebasestorage.app",
    messagingSenderId: "407254883412",
    appId: "1:407254883412:web:9e45ea9e8086b894afe1c1",
    measurementId: "G-9P04R5M58C"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);
  const provider = new GoogleAuthProvider();

  window._fbAuth = auth;
  window._fbDb   = db;
  window._currentUser = null;

  // ── Save to Firestore ──
  window.fbSaveFavorites = async (favs) => {
    if(!window._currentUser) return;
    await setDoc(doc(db,'users',window._currentUser.uid), { favorites: favs }, {merge:true});
  };
  window.fbSavePlaylists = async (pls) => {
    if(!window._currentUser) return;
    await setDoc(doc(db,'users',window._currentUser.uid), { playlists: pls }, {merge:true});
  };

  // ── Load from Firestore ──
  window.fbLoadUserData = async (uid) => {
    try{
      const snap = await getDoc(doc(db,'users',uid));
      if(snap.exists()){
        const data = snap.data();
        if(data.favorites)  { favorites = data.favorites;  localStorage.setItem('mfavs', JSON.stringify(favorites)); }
        if(data.playlists)  { playlists = data.playlists;  localStorage.setItem('mplaylists', JSON.stringify(playlists)); }
        // ✅ Singer choices bhi load karo Firebase se
        if(data.singers && data.singers.length > 0){
          selectedSingers = data.singers;
          localStorage.setItem('msingers', JSON.stringify(selectedSingers));
          localStorage.setItem('onboarded','1');
        }
        renderLibrary();
        renderFavorites();
      }
    }catch(e){ console.log('Load error:', e); }
  };

  // ── Save singers to Firestore ──
  window.fbSaveSingers = async (singers) => {
    if(!window._currentUser) return;
    await setDoc(doc(db,'users',window._currentUser.uid), { singers: singers }, {merge:true});
  };

  // ── Google Login ──
  window.googleLogin = async () => {
    try{
      document.getElementById('loginBtn').textContent = 'Logging in...';
      document.getElementById('loginBtn').disabled = true;
      let result;
      try {
        result = await signInWithPopup(auth, provider);
      } catch(e) {
        // Popup blocked → try redirect
        await signInWithRedirect(auth, provider);
        return;
      }
      // handled by onAuthStateChanged
    }catch(e){
      console.log(e);
      document.getElementById('loginBtn').textContent = 'google';
      document.getElementById('loginBtn').disabled = false;
      showToast('Login failed. Try again.');
    }
  };

  // ── Logout ──
  window.logoutUser = async () => {
    await signOut(auth);
    window._currentUser = null;
    favorites = []; playlists = []; selectedSingers = [];
    localStorage.clear();
    document.getElementById('userDropdown').classList.remove('open');
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appShell').classList.remove('visible');
  };

  // ── Auth State Listener ──
  onAuthStateChanged(auth, async (user) => {
    try{ await getRedirectResult(auth); }catch(e){}

    // Splash hata do hamesha
    const splash = document.getElementById('authSplash');
    if(splash) splash.style.display = 'none';

    if(user){
      window._currentUser = user;
      // Onboarding bhi chhupa do — logged in user ko nahi chahiye
      document.getElementById('onboarding').style.display = 'none';
      // Avatar update
      const av = document.getElementById('userAvatar');
      if(av){ av.src = user.photoURL||''; av.style.display = user.photoURL?'block':'none'; }
      const un = document.getElementById('userName');
      if(un) un.textContent = user.displayName?.split(' ')[0]||'Me';
      // Login screen hide
      document.getElementById('loginScreen').style.display = 'none';
      // App show
      const shell = document.getElementById('appShell');
      if(!shell.classList.contains('visible')){
        shell.classList.add('visible');
        buildHome();
        setupSearchSuggestions();
        setupMiniSeek();
        setupNpSeek();
        renderLibrary();
      }
      await window.fbLoadUserData(user.uid);
    } else {
      // Not logged in — show login screen directly
      document.getElementById('onboarding').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('appShell').classList.remove('visible');
    }
  });

</script>

// ITUNES FETCH — Sirf metadata + thumbnail ke liye (NO audio)
// ══════════════════════════════════════════
async function fetchSongs(query, limit=200){
  try{
    const url = `${ITUNES_API}?term=${encodeURIComponent(query)}&media=music&entity=song&limit=${limit}&country=in`;
    const r = await fetch(url);
    const d = await r.json();
    return (d.results||[]).map(t=>({
      id: t.trackId,
      name: t.trackName,
      artist: t.artistName,
      album: t.collectionName||'',
      duration: Math.round(t.trackTimeMillis/1000)||240,
      preview: '',           // iTunes preview NAHI use karna — Rohit API se chalega
      thumb: t.artworkUrl100||'',
      thumbLg: (t.artworkUrl100||'').replace('100x100','600x600'),
      emoji: '🎵',
    }));
  }catch(e){ return []; }
}

// YOUTUBE via Piped API (CORS-friendly)
// ══════════════════════════════════════════
const PIPED_NODES = [
  'https://pipedapi.kavin.rocks',
  'https://pipedapi.in.projectsegfault.org',
  'https://api.piped.private.coffee',
  'https://pipedapi.drgns.space',
];
let _pipedNode = null;

async function _pipedFetch(path, timeout=8000){
  const nodes = _pipedNode
    ? [_pipedNode, ...PIPED_NODES.filter(n=>n!==_pipedNode)]
    : PIPED_NODES;
  for(const base of nodes){
    try{
      const r = await fetch(base+path, {signal: AbortSignal.timeout(timeout)});
      if(!r.ok) continue;
      const d = await r.json();
      _pipedNode = base;
      return d;
    }catch(e){ continue; }
  }
  return null;
}

async function searchYouTube(q){
  const data = await _pipedFetch(`/search?q=${encodeURIComponent(q)}&filter=music_songs`);
  const items = data?.items || data?.results || [];
  if(!items.length) return [];
  return items.slice(0,15).filter(v=>v.url||v.videoId).map(v=>{
    const vid = v.videoId || v.url?.replace('/watch?v=','') || '';
    const thumb = v.thumbnail || v.thumbnailUrl || `https://i.ytimg.com/vi/${vid}/mqdefault.jpg`;
    return {
      id: 'yt_'+vid,
      videoId: vid,
      name: v.title||'Unknown',
      artist: v.uploaderName||v.author||'YouTube',
      album: '',
      duration: v.duration||240,
      thumb: thumb,
      thumbLg: `https://i.ytimg.com/vi/${vid}/hqdefault.jpg`,
      emoji:'▶️', isYT:true,
    };
  });
}

async function getYTAudioUrl(song){
  const data = await _pipedFetch(`/streams/${song.videoId}`);
  if(!data) return null;
  const audioStream = (data.audioStreams||[])
    .filter(s=>s.url)
    .sort((a,b)=>(b.bitrate||0)-(a.bitrate||0))[0];
  if(audioStream?.url) return {url: audioStream.url, duration: data.duration||240};
  const videoStream = (data.videoStreams||[]).find(s=>s.url);
  if(videoStream?.url) return {url: videoStream.url, duration: data.duration||240};
  return null;
}

// ROHIT MUSIC API — Full Song Fetcher
// Response: {success, results:[{title, artists, album, duration:"6:02", download_url}]}
// ══════════════════════════════════════════
const ROHIT_API = 'https://rohit-music-downloader-api.vercel.app/search?song=';

function parseDuration(str){
  // "6:02" -> 362 seconds
  if(!str) return 240;
  const parts = String(str).split(':').map(Number);
  if(parts.length === 2) return parts[0]*60 + parts[1];
  if(parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
  return parseInt(str)||240;
}

async function getFullSongUrl(song){
  try{
    const query = encodeURIComponent(song.name + ' ' + song.artist);
    const res = await fetch(ROHIT_API + query);
    const data = await res.json();

    if(data.success && Array.isArray(data.results) && data.results.length > 0){
      // Best match: prefer result whose title matches song name
      let best = data.results[0];
      const nameLower = song.name.toLowerCase();
      const found = data.results.find(r =>
        r.title && r.title.toLowerCase().includes(nameLower.split(' ')[0])
      );
      if(found) best = found;

      return {
        url: best.download_url,
        duration: parseDuration(best.duration)
      };
    }
    return null;
  } catch(e){ return null; }
}

// MEDIA SESSION API — Browser notification controls
// ══════════════════════════════════════════
function setupMediaSession(song){
  if(!('mediaSession' in navigator)) return;
  navigator.mediaSession.metadata = new MediaMetadata({
    title:  song.name   || 'Unknown',
    artist: song.artist || 'Unknown',
    album:  song.album  || 'Spotify Music ',
    artwork: song.thumbLg || song.thumb
      ? [{ src: song.thumbLg || song.thumb, sizes:'512x512', type:'image/jpeg' }]
      : []
  });
  navigator.mediaSession.setActionHandler('play',     ()=>{ audioEl.play(); setPlaying(true); });
  navigator.mediaSession.setActionHandler('pause',    ()=>{ audioEl.pause(); setPlaying(false); });
  navigator.mediaSession.setActionHandler('previoustrack', ()=>prevTrack());
  navigator.mediaSession.setActionHandler('nexttrack',     ()=>nextTrack());
  navigator.mediaSession.setActionHandler('seekto', (d)=>{
    if(audioEl.duration) audioEl.currentTime = d.seekTime;
  });
}

// PLAYBACK
// ══════════════════════════════════════════
function playTrack(song, queue){
  currentTrack = song;
  currentQueue = queue || [];
  currentQueueIndex = currentQueue.findIndex(s=>s.id===song.id);

  // Update all playing states
  document.querySelectorAll('.song-card.playing,.result-card.playing').forEach(el=>el.classList.remove('playing'));
  const sc = document.getElementById('scard-'+song.id);
  if(sc) sc.classList.add('playing');
  const tc = document.getElementById('tcard-'+song.id);
  if(tc) tc.classList.add('playing');

  // Mini player
  document.getElementById('miniPlayer').classList.add('visible');
  document.getElementById('miniTitle').textContent = song.name;
  document.getElementById('miniArtist').textContent = song.artist;

  const miniThumb = document.getElementById('miniThumb');
  if(song.thumb){ miniThumb.innerHTML = `<img src="${song.thumb}" alt="">`; }
  else { miniThumb.innerHTML = '🎵'; }

  // Now playing
  document.getElementById('npTitle').textContent = song.name;
  document.getElementById('npArtist').textContent = song.artist;
  const npArtImg = document.getElementById('npArtImg');
  const npEmoji = document.querySelector('.np-emoji');
  if(song.thumbLg || song.thumb){
    npArtImg.src = song.thumbLg || song.thumb;
    npArtImg.style.display='block';
    if(npEmoji) npEmoji.style.display='none';
    npArtImg.onerror = ()=>{ npArtImg.style.display='none'; if(npEmoji) npEmoji.style.display=''; };
  } else {
    npArtImg.style.display='none';
    if(npEmoji) npEmoji.style.display='';
  }

  // Fav buttons
  updateFavBtns(song);

  // NP bg tint
  document.querySelector('.np-bg').style.background =
    `linear-gradient(180deg,#1a2e1a 0%,#121212 60%)`;

  // Stop current audio
  audioEl.pause();
  clearInterval(playerInterval);
  currentTime = 0;
  currentDuration = song.duration || 200;
  updateSeeks(0);
  document.getElementById('npCurTime').textContent = '0:00';
  document.getElementById('npDurTime').textContent = fmtTime(currentDuration);

  // Show loading state
  setPlaying(false);
  document.getElementById('miniArtist').textContent = '⏳ Loading...';

  // YT songs use Piped API, others use Rohit API
  const audioFetch = song.isYT ? getYTAudioUrl(song) : getFullSongUrl(song);
  audioFetch.then(result => {
    // Check still same song playing
    if(currentTrack?.id !== song.id) return;

    document.getElementById('miniArtist').textContent = song.artist;

    if(result && result.url){
      currentDuration = result.duration || 240;
      audioEl.src = result.url;
      audioEl.play().then(()=>{
        setPlaying(true);
        setupMediaSession(song);
      }).catch(err=>{
        console.warn('Playback error:', err);
        setPlaying(false);
        showToast('Please retry');
      });
      audioEl.onended = ()=>{
        if(isRepeat){
          audioEl.currentTime = 0;
          audioEl.play().catch(()=>{});
        } else {
          nextTrack();
        }
      };
      audioEl.ontimeupdate = ()=>{
        if(!isMiniSeeking && !isNpSeeking && currentTrack?.id === song.id){
          currentTime = audioEl.currentTime;
          currentDuration = audioEl.duration || currentDuration;
          updateSeeks(currentTime / currentDuration);
          document.getElementById('npCurTime').textContent = fmtTime(Math.floor(currentTime));
          document.getElementById('npDurTime').textContent = fmtTime(Math.floor(currentDuration));
          // Media session position update
          if('mediaSession' in navigator && navigator.mediaSession.setPositionState && audioEl.duration){
            try{
              navigator.mediaSession.setPositionState({
                duration: audioEl.duration,
                playbackRate: 1,
                position: audioEl.currentTime
              });
            }catch(e){}
          }
        }
      };
      audioEl.onerror = ()=>{
        if(currentTrack?.id === song.id){
          showToast('⚠️ Song load nahi hua, skip kar raha hai...');
          setTimeout(()=>nextTrack(), 1500);
        }
      };
    } else {
      setPlaying(false);
      showToast('❌ Song nahi mila, skip kar raha hai...');
      setTimeout(()=>nextTrack(), 1500);
    }
  });
}

function setPlaying(val){
  isPlaying = val;
  document.getElementById('nowPlaying').classList.toggle('playing', val);
  const pauseIcon = `<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6zm8-14v14h4V5z"/></svg>`;
  const playIcon  = `<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
  const npPauseIcon = `<svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6zm8-14v14h4V5z"/></svg>`;
  const npPlayIcon  = `<svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
  document.getElementById('miniPlayBtn').innerHTML = val ? pauseIcon : playIcon;
  document.getElementById('npPlayBtn').innerHTML   = val ? npPauseIcon : npPlayIcon;
  // Sync media session
  if('mediaSession' in navigator){
    navigator.mediaSession.playbackState = val ? 'playing' : 'paused';
  }
}

function togglePlay(){
  if(!currentTrack) return;
  if(isPlaying){
    audioEl.pause();
    clearInterval(playerInterval);
    setPlaying(false);
  } else {
    if(audioEl.src){
      audioEl.play().then(()=>setPlaying(true)).catch(()=>{});
    } else {
      setPlaying(true);
      playerInterval = setInterval(()=>{
        if(!isPlaying) return;
        currentTime++;
        if(currentTime>=currentDuration){ nextTrack(); return; }
        updateSeeks(currentTime/currentDuration);
        document.getElementById('npCurTime').textContent = fmtTime(currentTime);
      },1000);
    }
  }
}

function nextTrack(){
  if(!currentQueue.length) return;
  let idx = currentQueueIndex;
  if(isShuffle){ idx = Math.floor(Math.random()*currentQueue.length); }
  else { idx = (currentQueueIndex+1) % currentQueue.length; }
  playTrack(currentQueue[idx], currentQueue);
}

function prevTrack(){
  if(!currentQueue.length) return;
  let idx = (currentQueueIndex-1+currentQueue.length) % currentQueue.length;
  playTrack(currentQueue[idx], currentQueue);
}

function toggleShuffle(){
  isShuffle = !isShuffle;
  document.getElementById('npShuffleBtn').style.color = isShuffle ? 'var(--accent)' : '';
}

function toggleRepeat(){
  isRepeat = !isRepeat;
  audioEl.loop = false; // Never use native loop — onended handles repeat
  document.getElementById('npRepeatBtn').style.color = isRepeat ? 'var(--accent)' : '';
}

function updateSeeks(pct){
  pct = Math.max(0, Math.min(1, pct||0));
  const p = (pct*100)+'%';
  document.getElementById('miniSeekFill').style.width = p;
  document.getElementById('npSeekFill').style.width = p;
  // Move thumbs
  const miniTrack = document.querySelector('.mini-seek-track');
  const miniThumb = document.getElementById('miniSeekThumb');
  if(miniTrack && miniThumb){
    const w = miniTrack.offsetWidth;
    miniThumb.style.left = (pct*w - 6)+'px';
    miniThumb.style.right = 'auto';
  }
  const npFill = document.getElementById('npSeekFill');
  const npThumb = document.getElementById('npSeekThumb');
  if(npFill && npThumb){
    npThumb.style.left = `calc(${pct*100}% - 7px)`;
  }
}

// ══════════════════════════════════════════
// SEEK — Drag based (not tap)
// ══════════════════════════════════════════
function setupMiniSeek(){
  const wrap = document.getElementById('miniSeekWrap');
  const track = wrap.querySelector('.mini-seek-track');

  function getPos(e){
    const rect = track.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    return Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  }

  function onStart(e){
    isMiniSeeking = true;
    wrap.classList.add('dragging');
    const pct = getPos(e);
    updateSeeks(pct);
    e.preventDefault();
  }
  function onMove(e){
    if(!isMiniSeeking) return;
    const pct = getPos(e);
    updateSeeks(pct);
    currentTime = pct * currentDuration;
    document.getElementById('npCurTime').textContent = fmtTime(Math.floor(currentTime));
    e.preventDefault();
  }
  function onEnd(e){
    if(!isMiniSeeking) return;
    isMiniSeeking = false;
    wrap.classList.remove('dragging');
    const pct = parseFloat(document.getElementById('miniSeekFill').style.width)/100;
    if(audioEl.src && currentTrack){ audioEl.currentTime = pct * (audioEl.duration||currentDuration); }
    else { currentTime = pct * currentDuration; }
  }

  wrap.addEventListener('touchstart', onStart, {passive:false});
  wrap.addEventListener('touchmove', onMove, {passive:false});
  wrap.addEventListener('touchend', onEnd);
  wrap.addEventListener('mousedown', onStart);
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onEnd);
}

function setupNpSeek(){
  const bar = document.getElementById('npSeekBar');
  const fill = document.getElementById('npSeekFill');

  function getPos(e){
    const rect = bar.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    return Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  }
  function onStart(e){
    isNpSeeking = true;
    bar.classList.add('dragging');
    e.preventDefault();
  }
  function onMove(e){
    if(!isNpSeeking) return;
    const pct = getPos(e);
    updateSeeks(pct);
    currentTime = pct * currentDuration;
    document.getElementById('npCurTime').textContent = fmtTime(Math.floor(currentTime));
    e.preventDefault();
  }
  function onEnd(e){
    if(!isNpSeeking) return;
    isNpSeeking = false;
    bar.classList.remove('dragging');
    const pct = parseFloat(fill.style.width)/100;
    if(audioEl.src && currentTrack){ audioEl.currentTime = pct * (audioEl.duration||currentDuration); }
    else { currentTime = pct * currentDuration; }
  }
  bar.addEventListener('touchstart', onStart, {passive:false});
  bar.addEventListener('touchmove', onMove, {passive:false});
  bar.addEventListener('touchend', onEnd);
  bar.addEventListener('mousedown', onStart);
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onEnd);
}

// ══════════════════════════════════════════
// FAVORITES
// ══════════════════════════════════════════
function toggleFav(song, btn){
  const idx = favorites.findIndex(f=>f.id===song.id);
  if(idx>=0){ favorites.splice(idx,1); }
  else { favorites.push(song); }
  saveFavorites();
  if(btn){ btn.classList.toggle('active', favorites.some(f=>f.id===song.id)); btn.textContent = favorites.some(f=>f.id===song.id)?'❤️':'♡'; }
  updateFavBtns(song);
}

function toggleCurrentFav(){
  if(!currentTrack) return;
  toggleFav(currentTrack, null);
  updateFavBtns(currentTrack);
}

function updateFavBtns(song){
  const isFav = favorites.some(f=>f.id===song.id);
  const npFav = document.getElementById('npFavBtn');
  const miniFav = document.getElementById('miniFavBtn');
  if(npFav){ npFav.textContent = isFav?'❤️':'♡'; npFav.classList.toggle('active',isFav); }
  if(miniFav){ miniFav.textContent = isFav?'❤️':'♡'; miniFav.classList.toggle('active',isFav); }
  // Update in lists
  const tcFav = document.querySelector(`#tcard-${song.id} .btn-fav`);
  if(tcFav){ tcFav.textContent = isFav?'❤️':'♡'; tcFav.classList.toggle('active',isFav); }
}

function renderFavorites(){
  const list = document.getElementById('favList');
  if(!favorites.length){
    list.innerHTML='<div class="playlist-empty"><div class="pe-icon">❤️</div><p>No liked songs yet. Tap ♡ on any song!</p></div>';
    return;
  }
  list.innerHTML = favorites.map((s,i)=>{
    const html = makeTrackCardHTML(s,i,favorites);
    return html;
  }).join('');
  // attach events
  favorites.forEach((s,i)=>{
    const el = document.getElementById('tcard-'+s.id);
    if(el){
      el.onclick=()=>playTrack(s,favorites);
      const fb = el.querySelector('.btn-fav');
      if(fb) fb.onclick=e=>{e.stopPropagation();toggleFav(s,fb)};
      const ab = el.querySelector('.btn-addpl');
      if(ab) ab.onclick=e=>{e.stopPropagation();addToPlaylist(s)};
      const rb = el.querySelector('.btn-remove');
      if(rb) rb.onclick=e=>{e.stopPropagation();toggleFav(s,null);renderFavorites()};
    }
  });
}

// ══════════════════════════════════════════
// PLAYLISTS
// ══════════════════════════════════════════
function renderLibrary(){
  const c = document.getElementById('playlistContainer');
  if(!playlists.length){
    c.innerHTML='<div class="playlist-empty"><div class="pe-icon">🎵</div><p>No playlists yet. Create one!</p></div>';
    return;
  }
  c.innerHTML = playlists.map((pl,i)=>`
    <div style="background:var(--surface);border-radius:12px;padding:14px 14px;margin-bottom:10px;display:flex;align-items:center;gap:12px">
      <div style="width:46px;height:46px;border-radius:8px;background:linear-gradient(135deg,rgba(29,185,84,.3),rgba(29,185,84,.1));flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.3rem;cursor:pointer" onclick="openPlaylist(${i})">🎵</div>
      <div style="flex:1;min-width:0;cursor:pointer" onclick="openPlaylist(${i})">
        <div style="font-weight:700;font-size:.88rem;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(pl.name)}</div>
        <div style="font-size:.7rem;color:var(--sub)">${pl.songs.length} song${pl.songs.length!==1?'s':''}</div>
      </div>
      <button onclick="openPlaylistEdit(${i})" title="Edit Playlist"
        style="background:none;border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:6px 10px;color:var(--sub);font-size:.68rem;font-family:inherit;font-weight:700;cursor:pointer;transition:all .15s;flex-shrink:0"
        onmouseover="this.style.color='var(--accent)';this.style.borderColor='var(--accent)'" onmouseout="this.style.color='var(--sub)';this.style.borderColor='rgba(255,255,255,.2)'">✏️ Edit</button>
      <button onclick="playPlaylistAll(${i})" title="Play All"
        style="background:var(--accent);border:none;border-radius:50%;width:40px;height:40px;
               display:flex;align-items:center;justify-content:center;cursor:pointer;
               flex-shrink:0;box-shadow:0 3px 12px rgba(29,185,84,.45);transition:transform .15s,background .15s"
        onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#000"><path d="M8 5v14l11-7z"/></svg>
      </button>
    </div>`).join('');
}

function openPlaylistEdit(idx){
  const pl = playlists[idx];
  if(!pl) return;

  function buildEditHTML(){
    const rows = pl.songs.length === 0
      ? '<div style="color:var(--sub);font-size:.8rem;padding:16px 0;text-align:center">Playlist khaali hai</div>'
      : pl.songs.map((s,i)=>`
        <div style="display:flex;align-items:center;gap:8px;padding:7px 4px;border-bottom:1px solid rgba(255,255,255,.05)">
          <div style="width:36px;height:36px;border-radius:5px;background:var(--s2);flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:.85rem">
            ${s.thumb?`<img src="${s.thumb}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`:'🎵'}
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-size:.76rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(s.name)}</div>
            <div style="font-size:.62rem;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(s.artist)}</div>
          </div>
          <div class="pl-edit-actions">
            <button class="pl-move-btn" onclick="plMoveSong(${idx},${i},-1)" ${i===0?'disabled':''} title="Move Up">▲</button>
            <button class="pl-move-btn" onclick="plMoveSong(${idx},${i},1)" ${i===pl.songs.length-1?'disabled':''} title="Move Down">▼</button>
            <button class="pl-del-btn" onclick="plRemoveSong(${idx},${i})" title="Remove">✕</button>
          </div>
        </div>`).join('');

    return `
      <div class="modal-title">✏️ ${esc(pl.name)} <span style="font-size:.7rem;color:var(--sub);font-weight:500">(${pl.songs.length} songs)</span></div>
      <div id="editSongList">${rows}</div>
      <button class="modal-cancel" style="margin-top:14px" onclick="closeModal();renderLibrary()">Done</button>`;
  }

  openModal(buildEditHTML());
  window._editPlIdx = idx;
  window._rebuildEditModal = ()=>{ document.getElementById('modalBox').innerHTML = buildEditHTML(); };
}

function plMoveSong(plIdx, songIdx, dir){
  const arr = playlists[plIdx].songs;
  const newIdx = songIdx + dir;
  if(newIdx < 0 || newIdx >= arr.length) return;
  [arr[songIdx], arr[newIdx]] = [arr[newIdx], arr[songIdx]];
  savePlaylists();
  if(window._rebuildEditModal) window._rebuildEditModal();
}

function plRemoveSong(plIdx, songIdx){
  playlists[plIdx].songs.splice(songIdx, 1);
  savePlaylists();
  if(window._rebuildEditModal) window._rebuildEditModal();
}

function playPlaylistAll(idx){
  const pl = playlists[idx];
  if(!pl || !pl.songs.length){ showToast('Playlist khaali hai'); return; }
  showToast(`▶ Playing: ${pl.name} (${pl.songs.length} songs)`);
  playTrack(pl.songs[0], pl.songs);
}

function showCreatePlaylist(){
  const html = `
    <div class="modal-title">New Playlist</div>
    <input class="modal-input" id="plNameInput" placeholder="Playlist name..." maxlength="50">
    <button class="modal-btn" onclick="createPlaylist()">Create</button>
    <button class="modal-cancel" onclick="closeModal()">Cancel</button>`;
  openModal(html);
  setTimeout(()=>document.getElementById('plNameInput')?.focus(),200);
}

function createPlaylist(){
  const name = document.getElementById('plNameInput')?.value.trim();
  if(!name) return;
  playlists.push({name, songs:[]});
  savePlaylists();
  closeModal();
  renderLibrary();
}

function addToPlaylist(song){
  if(!playlists.length){
    const html = `
      <div class="modal-title">No playlists yet!</div>
      <p style="color:var(--sub);font-size:.82rem;margin-bottom:16px">Create a playlist first.</p>
      <input class="modal-input" id="plNameInput" placeholder="Playlist name...">
      <button class="modal-btn" onclick="quickCreateAndAdd('${song.id}')">Create & Add</button>
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>`;
    openModal(html);
    window._pendingSong = song;
    return;
  }
  const html = `
    <div class="modal-title">Add to Playlist</div>
    ${playlists.map((pl,i)=>`
      <div class="pl-item" onclick="addSongToPlaylist(${i},'${song.id}')">
        <span class="pl-item-icon">🎵</span>
        <div class="pl-item-info">
          <div class="pl-item-name">${esc(pl.name)}</div>
          <div class="pl-item-count">${pl.songs.length} songs</div>
        </div>
      </div>`).join('')}
    <button class="modal-cancel" onclick="closeModal()">Cancel</button>`;
  openModal(html);
  window._pendingSong = song;
}

function addCurrentToPlaylist(){
  if(currentTrack) addToPlaylist(currentTrack);
}

function addSongToPlaylist(plIdx, songId){
  const song = window._pendingSong;
  if(!song) return;
  if(!playlists[plIdx].songs.find(s=>s.id===song.id)){
    playlists[plIdx].songs.push(song);
    savePlaylists();
  }
  closeModal();
  showToast(`Added to "${playlists[plIdx].name}" ✓`);
}

function quickCreateAndAdd(songId){
  const name = document.getElementById('plNameInput')?.value.trim();
  if(!name) return;
  const song = window._pendingSong;
  playlists.push({name, songs: song ? [song] : []});
  savePlaylists();
  closeModal();
  showToast(`Added to "${name}" ✓`);
}

function openPlaylist(idx){
  const pl = playlists[idx];
  if(!pl) return;
  if(!pl.songs.length){
    showToast('Playlist is empty');
    return;
  }
  const html = `
    <div class="modal-title">${esc(pl.name)} (${pl.songs.length} songs)</div>
    <div class="track-list">
      ${pl.songs.map((s,i)=>makeTrackCardHTML(s,i,pl.songs)).join('')}
    </div>
    <button class="modal-cancel" onclick="closeModal()">Close</button>`;
  openModal(html);
  pl.songs.forEach((s,i)=>{
    const el = document.getElementById('tcard-'+s.id);
    if(el){
      el.onclick=()=>{closeModal();playTrack(s,pl.songs)};
      const rb = el.querySelector('.btn-remove');
      if(rb) rb.onclick=e=>{e.stopPropagation();pl.songs.splice(i,1);savePlaylists();closeModal();};
    }
  });
}

// ══════════════════════════════════════════
// LYRICS
// ══════════════════════════════════════════
async function showLyrics(){
  if(!currentTrack) return;
  closeNowPlaying();
  showPage('home', document.querySelectorAll('.nav-tab')[0]);
  const panel = document.getElementById('lyricsPanel');
  const content = document.getElementById('lyricsContent');
  document.getElementById('lyricsSongName').textContent = currentTrack.name + ' — ' + currentTrack.artist;
  panel.classList.add('open');
  content.textContent = 'Loading lyrics...';

  // Use Anthropic API to generate lyrics context
  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:800,
        messages:[{role:'user',content:`Write sample lyrics for a song called "${currentTrack.name}" by "${currentTrack.artist}". Keep them short (2 verses + chorus) and relevant to the song's mood. Format nicely.`}]
      })
    });
    const d = await res.json();
    content.textContent = d.content?.[0]?.text || 'Lyrics not available for this track.';
  }catch(e){
    content.textContent = `♪ ${currentTrack.name} ♪\nby ${currentTrack.artist}\n\n[Lyrics not available for preview tracks.\nSearch the song name + "lyrics" on Google for full lyrics.]`;
  }
}

function closeLyrics(){
  document.getElementById('lyricsPanel').classList.remove('open');
}

// ══════════════════════════════════════════
// MODAL & TOAST
// ══════════════════════════════════════════
function openModal(html){
  document.getElementById('modalBox').innerHTML = html;
  document.getElementById('modalOverlay').classList.remove('hidden');
}
function closeModal(e){
  if(e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.add('hidden');
}

let toastTimer;
function showToast(msg){
  let t = document.getElementById('toast');
  if(!t){ t=document.createElement('div'); t.id='toast'; t.style.cssText='position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#fff;color:#000;padding:8px 18px;border-radius:500px;font-size:.78rem;font-weight:700;z-index:9999;pointer-events:none;transition:opacity .3s'; document.body.appendChild(t); }
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.style.opacity='0',2500);
}

// ══════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════
function fmtTime(s){
  s = Math.floor(s||0);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}
function esc(s){ const d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }
